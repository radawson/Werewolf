version=1.0.10

# Gradle Performance Settings
# Enable parallel project builds
org.gradle.parallel=true

# Maximum number of worker threads (12 for 16 CPU system, leaving headroom for WSL)
org.gradle.workers.max=12

# Enable Gradle daemon for faster builds
org.gradle.daemon=true

# JVM arguments for better performance
org.gradle.jvmargs=-Xmx4g -Xms1g -XX:MaxMetaspaceSize=512m -XX:+UseG1GC
